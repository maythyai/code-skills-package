# ─── Intent Classification Patterns ───
# Used by confidence-router for semantic intent matching
intent_patterns:
  implement_feature:
    patterns: ["implement", "build", "create", "add", "develop", "实现", "开发", "添加", "创建"]
    skills: [csp-implementation-phase, csp-implement, csp-tdd]
    phase_hint: build
    weight: 50

  fix_bug:
    patterns: ["fix", "debug", "resolve", "patch", "修复", "调试", "排错"]
    skills: [csp-debug, csp-systematic-debugging]
    phase_hint: build
    weight: 50

  design_architecture:
    patterns: ["design", "architect", "structure", "plan", "设计", "架构", "规划"]
    skills: [csp-plan-phase, csp-brainstorming, csp-solutioning-phase]
    phase_hint: plan
    weight: 50

  review_code:
    patterns: ["review", "audit", "check", "inspect", "审查", "审核", "检查"]
    skills: [csp-code-review, csp-requesting-code-review]
    phase_hint: review
    weight: 50

  optimize_performance:
    patterns: ["optimize", "improve", "enhance", "speed up", "优化", "性能"]
    skills: [csp-performance-optimizer]
    phase_hint: build
    weight: 45

  write_tests:
    patterns: ["test", "spec", "coverage", "测试", "覆盖率"]
    skills: [csp-tdd, csp-e2e-testing, csp-test-engineer]
    phase_hint: verify
    weight: 45

  deploy_release:
    patterns: ["deploy", "release", "ship", "publish", "部署", "发布", "上线"]
    skills: [csp-ship, csp-deployment]
    phase_hint: ship
    weight: 50

  security_audit:
    patterns: ["security", "vulnerability", "CVE", "安全", "漏洞"]
    skills: [csp-security-review, csp-secure-phase]
    phase_hint: review
    weight: 50

  explore_codebase:
    patterns: ["explore", "understand", "navigate", "探索", "理解", "导览"]
    skills: [csp-explore, csp-map-codebase, csp-code-tour-guide]
    phase_hint: plan
    weight: 45

  # ─── Regex Pattern Layer ───
  # Flexible pattern matching for nuanced intent detection
  refactor_request:
    patterns: ["re\\s*factor", "clean\\s*up", "code\\s*smell", "tech\\s*debt", "重构", "代码异味", "技术债"]
    skills: [csp-refactorer, csp-refactoring-strategies]
    phase_hint: build
    weight: 50

  performance_issue:
    patterns: ["slow", "latency", "bottleneck", "lag", "卡", "慢", "延迟", "性能.*问题"]
    skills: [csp-performance-optimizer, csp-web-performance-auditor]
    phase_hint: build
    weight: 50

  migration_task:
    patterns: ["migrat", "upgrade.*version", "port.*to", "迁移", "升级.*版本", "移植"]
    skills: [csp-deprecation-and-migration, csp-legacy-modernization]
    phase_hint: plan
    weight: 50

  documentation_request:
    patterns: ["document", "readme", "docs?", "wiki", "changelog", "文档", "说明", "注释"]
    skills: [csp-docs-update, csp-document-generator]
    phase_hint: review
    weight: 45

  hotfix_urgent:
    patterns: ["hotfix", "urgent", "production.*issue", "emergency", "P0", "紧急", "线上.*问题", "生产.*故障"]
    skills: [csp-debug, csp-systematic-debugging, csp-incident-commander]
    phase_hint: build
    weight: 50

  api_work:
    patterns: ["api", "endpoint", "route", "controller", "接口", "端点", "REST", "GraphQL"]
    skills: [csp-api-design, csp-api-tester]
    phase_hint: build
    weight: 45

  database_work:
    patterns: ["database", "schema", "migration", "table", "index", "query", "数据库", "表", "索引", "查询优化"]
    skills: [csp-postgres-optimizer, csp-sql-reviewer, csp-data-engineer]
    phase_hint: build
    weight: 45

  ci_cd:
    patterns: ["ci", "cd", "pipeline", "github.*action", "workflow.*run", "deploy.*script", "构建", "流水线", "自动化部署"]
    skills: [csp-cicd-pipelines, csp-deployment]
    phase_hint: ship
    weight: 50

  onboarding:
    patterns: ["onboard", "getting.*started", "new.*developer", "codebase.*tour", "入门", "新人", "项目导览"]
    skills: [csp-code-tour-guide, csp-codebase-onboarding]
    phase_hint: plan
    weight: 45

# ─── SDD State-Aware Routing ───
# Detect current development phase from artifacts and route accordingly
sdd_state_routing:
  artifact_checks:
    - path: ".csp/artifacts/understand.md"
      phase: "understand_complete"
    - path: ".csp/artifacts/plan.md"
      phase: "plan_complete"
    - path: ".csp/artifacts/spec.md"
      phase: "spec_complete"
    - path: ".csp/artifacts/implement.md"
      phase: "implement_complete"
    - path: ".csp/artifacts/review.md"
      phase: "review_complete"
    - path: ".csp/artifacts/verify.md"
      phase: "verify_complete"

  routing_rules:
    - when: "!artifact_exists('.csp/artifacts/understand.md')"
      boost: [csp-codebase-mapper]
      phase_hint: understand
    - when: "understand_complete && !plan_complete"
      boost: [csp-writing-plans, csp-plan-phase]
      phase_hint: plan
    - when: "plan_complete && !spec_complete"
      boost: [csp-spec-contract]
      phase_hint: spec
    - when: "spec_complete && !implement_complete"
      boost: [csp-tdd, csp-executing-plans]
      phase_hint: implement
    - when: "implement_complete && !review_complete"
      boost: [csp-code-review, csp-multi-review]
      phase_hint: review
    - when: "review_complete && !verify_complete"
      boost: [csp-verification, csp-verify-phase]
      phase_hint: verify
