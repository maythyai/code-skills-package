# Documentation schema for learnings written by csp-compound
# Treat this as the canonical frontmatter contract for docs/solutions/.

# --- Track classification ---------------------------------------------------
tracks:
  bug:
    description: "Defects, failures, and errors that were diagnosed and fixed"
    problem_types:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
  knowledge:
    description: "Practices, patterns, conventions, decisions, workflow improvements, and documentation"
    problem_types:
      - best_practice
      - documentation_gap
      - workflow_issue
      - developer_experience
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention

# --- Fields required by BOTH tracks -----------------------------------------
required_fields:
  module:
    type: string
    description: "Module or area affected"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date documented (YYYY-MM-DD)"

  problem_type:
    type: enum
    values:
      - build_error
      - test_failure
      - runtime_error
      - performance_issue
      - database_issue
      - security_issue
      - ui_bug
      - integration_issue
      - logic_error
      - developer_experience
      - workflow_issue
      - best_practice
      - documentation_gap
      - architecture_pattern
      - design_pattern
      - tooling_decision
      - convention
    description: "Primary category — determines track (bug vs knowledge). Prefer the narrowest applicable value."

  component:
    type: enum
    values:
      - api
      - database
      - frontend
      - backend
      - authentication
      - testing
      - deployment
      - configuration
      - documentation
      - tooling
      - data_processing
      - messaging
      - caching
      - ui_component
      - state_management
      - build_system
    description: "Component involved"

  severity:
    type: enum
    values:
      - critical
      - high
      - medium
      - low
    description: "Impact severity"

# --- Track-specific rules ----------------------------------------------------
track_rules:
  bug:
    required:
      symptoms:
        type: array[string]
        min_items: 1
        max_items: 5
        description: "Observable symptoms such as errors or broken behavior"
      root_cause:
        type: enum
        values:
          - missing_dependency
          - missing_config
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Fundamental technical cause of the problem"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
        description: "Type of fix applied"

  knowledge:
    optional:
      applies_when:
        type: array[string]
        max_items: 5
        description: "Conditions or situations where this guidance applies"
      symptoms:
        type: array[string]
        max_items: 5
        description: "Observable gaps or friction that prompted this guidance (optional for knowledge track)"
      root_cause:
        type: enum
        values:
          - missing_dependency
          - missing_config
          - missing_index
          - wrong_api
          - scope_issue
          - thread_violation
          - async_timing
          - memory_leak
          - config_error
          - logic_error
          - test_isolation
          - missing_validation
          - missing_permission
          - missing_workflow_step
          - inadequate_documentation
          - missing_tooling
          - incomplete_setup
        description: "Underlying cause, if there is a specific one (optional for knowledge track)"
      resolution_type:
        type: enum
        values:
          - code_fix
          - migration
          - config_change
          - test_fix
          - dependency_update
          - environment_setup
          - workflow_improvement
          - documentation_update
          - tooling_addition
        description: "Type of change, if applicable (optional for knowledge track)"

# --- Fields optional for BOTH tracks ----------------------------------------
optional_fields:
  related_components:
    type: array[string]
    description: "Other components involved"

  tags:
    type: array[string]
    max_items: 8
    description: "Search keywords, lowercase and hyphen-separated"

# --- Validation rules --------------------------------------------------------
validation_rules:
  - "Determine track from problem_type using the tracks section above"
  - "All shared required_fields must be present"
  - "Bug-track required fields (symptoms, root_cause, resolution_type) must be present on bug-track docs"
  - "Knowledge-track docs have no additional required fields beyond the shared ones"
  - "Enum fields must match allowed values exactly"
  - "Array fields must respect min/max item counts"
  - "date must match YYYY-MM-DD format"
  - "tags should be lowercase and hyphen-separated"
  - "Array-of-strings frontmatter items must be wrapped in double quotes when the value starts with a YAML reserved indicator or contains the substring ': '"
