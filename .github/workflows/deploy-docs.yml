name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'csp-router/**'
      - 'csp-meta/**'
      - 'csp-workflow/**'
      - 'csp-patterns/**'
      - 'csp-runtime/**'
      - 'docs/csp-page/**'
      - 'shared/scripts/build-registry.mjs'
      - 'shared/scripts/build-page.mjs'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Rebuild registry.json from skill sources, then regenerate the
      # CSP_DATA payload embedded in docs/csp-page/index.html so the
      # published dashboard always reflects the current skill set.
      - name: Rebuild dashboard data
        run: |
          node shared/scripts/build-registry.mjs
          node shared/scripts/build-page.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/csp-page

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
