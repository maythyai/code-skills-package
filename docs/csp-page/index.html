<title>CSP Code Skills Package — Dashboard v0.7.0</title>
<style>
:root {
  --bg-primary: #0f0f14;
  --bg-secondary: #1a1a24;
  --bg-card: #1e1e2e;
  --bg-card-hover: #262638;
  --text-primary: #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --border: #2a2a3a;
  --layer-0: #ef4444;
  --layer-1: #3b82f6;
  --layer-2: #22c55e;
  --layer-3: #a855f7;
  --layer-4: #f97316;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}
a { color: var(--layer-1); text-decoration: none; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,15,20,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-title { font-size: 20px; font-weight: 700; }
.header-badge {
  background: var(--layer-3);
  color: white;
  padding: 2px 10px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
  margin-left: 10px;
}
.header-sub { color: var(--text-muted); font-size: 13px; }

/* Container */
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* Hero - Layer Stack */
.hero { margin: 32px 0 48px; }
.hero h2 { font-size: 28px; margin-bottom: 20px; }
.layer-stack {
  display: flex; flex-direction: column; gap: 2px;
  max-width: 600px; margin: 0 auto;
}
.layer-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
  position: relative;
}
.layer-bar:hover { transform: scale(1.03); filter: brightness(1.1); }
.layer-bar .label { font-weight: 600; font-size: 15px; }
.layer-bar .desc { font-size: 12px; opacity: 0.8; }
.layer-bar .count {
  font-size: 24px; font-weight: 700;
  background: rgba(255,255,255,0.15);
  padding: 4px 14px; border-radius: 8px;
}
.layer-arrow {
  text-align: center; font-size: 20px; color: var(--text-muted);
  padding: 4px 0;
}

/* Stats Cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin: 32px 0 48px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.stat-card .value {
  font-size: 36px; font-weight: 800;
  background: var(--accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-card .label { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.stat-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
}

/* Charts Section */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px; margin: 32px 0 48px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.chart-card h3 {
  font-size: 18px; margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Donut Chart */
.donut-container { display: flex; align-items: center; gap: 24px; }
.donut-svg { width: 180px; height: 180px; flex-shrink: 0; }
.legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}

/* Stacked Bar */
.stacked-bar {
  display: flex; height: 32px; border-radius: 8px; overflow: hidden;
  margin: 12px 0;
}
.stacked-segment {
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: white;
  min-width: 30px; transition: filter 0.2s;
}
.stacked-segment:hover { filter: brightness(1.2); }
.bar-labels { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.bar-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary);
}
.bar-label .dot { width: 8px; height: 8px; border-radius: 50%; }
.bar-label .dot { width: 8px; height: 8px; border-radius: 50%; }

/* Explorer */
.explorer { margin: 32px 0 48px; }
.explorer h2 { font-size: 24px; margin-bottom: 16px; }
.explorer-controls {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.search-input {
  flex: 1; min-width: 200px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--layer-1); }
.search-input::placeholder { color: var(--text-muted); }
.filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-pill {
  padding: 6px 14px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  transition: all 0.2s;
}
.filter-pill:hover { border-color: currentColor; }
.filter-pill.active { color: white; border-color: transparent; }
.result-count { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

/* Skill Groups */
.skill-group {
  margin-bottom: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.skill-group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.skill-group-header:hover { background: var(--bg-card-hover); }
.skill-group-title {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 15px;
}
.group-dot { width: 12px; height: 12px; border-radius: 50%; }
.group-count {
  background: rgba(255,255,255,0.1);
  padding: 2px 10px; border-radius: 99px;
  font-size: 12px; color: var(--text-secondary);
}
.skill-group-body { display: none; }
.skill-group-body.open { display: block; }

/* Skill Card */
.skill-card {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  transition: background 0.15s;
}
.skill-card:hover { background: var(--bg-card-hover); }
.skill-name { font-weight: 600; font-size: 14px; white-space: nowrap; }
.skill-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
.skill-badges { display: flex; gap: 6px; flex-shrink: 0; margin-left: auto; }
.skill-triggers { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
.trigger-tag {
  padding: 1px 5px; border-radius: 3px;
  font-size: 9px; background: rgba(255,255,255,0.04);
  color: var(--text-muted);
}
.badge {
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  white-space: nowrap;
}
.badge-layer { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.badge-origin { background: rgba(255,255,255,0.06); color: var(--text-secondary); }

/* Architecture Diagram */
.arch-section { margin: 48px 0; }
.arch-section h2 { font-size: 24px; margin-bottom: 20px; }
.arch-svg { width: 100%; height: auto; }

/* Footer */
.footer {
  text-align: center; padding: 32px;
  color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border);
}

/* Animations */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeInUp 0.5s ease-out forwards;
  opacity: 0;
}
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }

/* Responsive */
@media (max-width: 768px) {
  .charts-row { grid-template-columns: 1fr; }
  .donut-container { flex-direction: column; align-items: center; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .skill-card { flex-direction: column; }
  .skill-badges { margin-left: 0; margin-top: 6px; }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr; }
  .container { padding: 16px; }
}
</style>

// ═══════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════

const LAYERS = [
  { id: 'L0', name: 'Router',    color: '#ef4444', desc: '任务分类 + Skill 选择' },
  { id: 'L1', name: 'Meta',      color: '#3b82f6', desc: '方法论: brainstorming, TDD, debugging...' },
  { id: 'L2', name: 'Workflow',  color: '#22c55e', desc: '项目生命周期: plan → execute → verify → ship' },
  { id: 'L3', name: 'Patterns',  color: '#a855f7', desc: '语言/框架 patterns, reviewers, build-resolvers' },
  { id: 'L4', name: 'Runtime',   color: '#f97316', desc: '运行时: autopilot, ralph, wiki, remember' },
];

function renderHeader() {
  const s = CSP_DATA.stats;
  document.getElementById('header-stats').textContent =
    `${s.total} skills · ${Object.keys(s.by_layer).length} layers · ${Object.keys(s.by_origin).length} origins`;
}

function renderLayerStack() {
  const el = document.getElementById('layer-stack');
  const stats = CSP_DATA.stats.by_layer;
  let html = '';
  LAYERS.forEach((l, i) => {
    const count = stats[l.name]?.count || 0;
    if (i > 0) html += '<div class="layer-arrow">▼</div>';
    html += `<div class="layer-bar" style="background:${l.color}22; border-left: 4px solid ${l.color}" onclick="scrollToLayer('${l.id}')">
      <div>
        <div class="label" style="color:${l.color}">${l.id} — ${l.name}</div>
        <div class="desc" style="color:${l.color}99">${l.desc}</div>
      </div>
      <div class="count" style="color:${l.color}">${count}</div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderStatsCards() {
  const el = document.getElementById('stats-row');
  const s = CSP_DATA.stats;
  const cards = [
    { value: s.total, label: 'Total Skills', accent: '#e4e4e7' },
    { value: s.reviewers || 0, label: 'Reviewers / Analysts', accent: '#a855f7' },
    { value: s.by_layer['Workflow']?.count || 9, label: 'Workflows', accent: '#22c55e' },
    { value: s.by_layer['Runtime']?.count || 33, label: 'Runtime Skills', accent: '#f97316' },
  ];
  el.innerHTML = cards.map(c => `
    <div class="stat-card" style="--accent:${c.accent}">
      <div class="value">${c.value}</div>
      <div class="label">${c.label}</div>
    </div>
  `).join('');
}

function renderDonutChart() {
  const origins = CSP_DATA.stats.by_origin;
  const total = CSP_DATA.stats.total;
  const colors = ['#3b82f6','#a855f7','#22c55e','#f97316','#ef4444','#eab308','#06b6d4'];
  const entries = Object.entries(origins).sort((a,b) => b[1]-a[1]);

  // SVG donut
  let svg = '<svg class="donut-svg" viewBox="0 0 42 42">';
  svg += '<circle cx="21" cy="21" r="15.9" fill="transparent" stroke="#2a2a3a" stroke-width="5"/>';
  let cumulative = 0;
  entries.forEach(([name, count], i) => {
    const pct = count / total * 100;
    const dashArray = `${pct} ${100 - pct}`;
    const offset = 25 - cumulative;
    svg += `<circle cx="21" cy="21" r="15.9" fill="transparent" stroke="${colors[i % colors.length]}" stroke-width="5"
      stroke-dasharray="${dashArray}" stroke-dashoffset="${offset}" style="transition: all 0.8s ease"/>`;
    cumulative += pct;
  });
  svg += `<text x="21" y="20" text-anchor="middle" fill="#e4e4e7" font-size="5" font-weight="700">${total}</text>`;
  svg += `<text x="21" y="24" text-anchor="middle" fill="#71717a" font-size="2.5">skills</text>`;
  svg += '</svg>';
  document.getElementById('donut-chart').outerHTML = svg;

  // Legend
  const legend = document.getElementById('donut-legend');
  legend.innerHTML = entries.map(([name, count], i) =>
    `<div class="legend-item">
      <span class="legend-dot" style="background:${colors[i % colors.length]}"></span>
      <span>${name} (${count}, ${(count/total*100).toFixed(0)}%)</span>
    </div>`
  ).join('');
}

function renderCategoryBar() {
  const cats = CSP_DATA.stats.by_category;
  const total = CSP_DATA.stats.total;
  const layerColors = {
    'router': '#ef4444', 'meta': '#3b82f6', 'workflow': '#22c55e',
    'patterns': '#a855f7', 'runtime': '#f97316', 'agent': '#eab308'
  };
  const entries = Object.entries(cats).sort((a,b) => b[1]-a[1]);

  // Stacked bar
  let barHtml = '<div class="stacked-bar">';
  entries.forEach(([cat, count]) => {
    const pct = count / total * 100;
    const color = layerColors[cat] || '#666';
    barHtml += `<div class="stacked-segment" style="width:${pct}%;background:${color}" title="${cat}: ${count}">${count}</div>`;
  });
  barHtml += '</div>';
  document.getElementById('category-bar').innerHTML = barHtml;

  // Labels
  document.getElementById('category-labels').innerHTML = entries.map(([cat, count]) => {
    const color = layerColors[cat] || '#666';
    return `<div class="bar-label"><span class="dot" style="background:${color}"></span>${cat} (${count})</div>`;
  }).join('');
}

function renderExplorer() {
  // Filter pills
  const pillsEl = document.getElementById('filter-pills');
  let pillsHtml = `<div class="filter-pill active" data-layer="all" style="background:var(--text-muted);color:white">All</div>`;
  LAYERS.forEach(l => {
    pillsHtml += `<div class="filter-pill" data-layer="${l.id}" style="--pill-color:${l.color}">${l.id} ${l.name}</div>`;
  });
  pillsEl.innerHTML = pillsHtml;

  // Pill click handlers
  document.querySelectorAll('.filter-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      if (pill.dataset.layer === 'all') {
        pill.style.background = 'var(--text-muted)';
        pill.style.color = 'white';
      } else {
        pill.style.background = pill.style.getPropertyValue('--pill-color');
        pill.style.color = 'white';
      }
      renderSkillList();
    });
  });

  // Search handler
  document.getElementById('search-input').addEventListener('input', renderSkillList);

  renderSkillList();
}

function renderSkillList() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const activeLayer = document.querySelector('.filter-pill.active')?.dataset.layer || 'all';

  let skills = CSP_DATA.skills || [];

  // Filter
  if (activeLayer !== 'all') {
    skills = skills.filter(s => s.layer === activeLayer);
  }
  if (query) {
    skills = skills.filter(s =>
      s.name.toLowerCase().includes(query) ||
      (s.description && s.description.toLowerCase().includes(query))
    );
  }

  document.getElementById('result-count').textContent = `显示 ${skills.length} / ${CSP_DATA.stats.total} 个技能`;

  // Group by layer
  const groups = {};
  skills.forEach(s => {
    if (!groups[s.layer]) groups[s.layer] = [];
    groups[s.layer].push(s);
  });

  let html = '';
  LAYERS.forEach(l => {
    const layerSkills = groups[l.id] || [];
    if (layerSkills.length === 0) return;
    const isOpen = activeLayer === l.id && activeLayer !== 'all';
    html += `<div class="skill-group" data-layer="${l.id}">
      <div class="skill-group-header" onclick="toggleGroup(this)">
        <div class="skill-group-title">
          <span class="group-dot" style="background:${l.color}"></span>
          ${l.id} ${l.name}
          <span class="group-count">${layerSkills.length}</span>
        </div>
        <span class="toggle-icon">${isOpen ? '▼' : '▶'}</span>
      </div>
      <div class="skill-group-body ${isOpen ? 'open' : ''}">`;
    layerSkills.forEach(s => {
      const desc = s.description && s.description !== '>' ? s.description : 'No description available';
      const triggers = s.triggers || { en: [], zh: [] };
      const allTriggers = [...triggers.en.slice(0, 3), ...triggers.zh.slice(0, 2)];
      const triggerHtml = allTriggers.map(t => `<span class="trigger-tag">${t}</span>`).join('');
      html += `<div class="skill-card">
        <div>
          <div class="skill-name">${s.name}</div>
          <div class="skill-desc">${desc}</div>
          <div class="skill-triggers">${triggerHtml}</div>
        </div>
        <div class="skill-badges">
          <span class="badge badge-layer" style="border:1px solid ${l.color}40;color:${l.color}">${l.id}</span>
          <span class="badge badge-origin">${s.origin}</span>
        </div>
      </div>`;
    });
    html += '</div></div>';
  });

  if (!html) {
    html = '<div style="text-align:center;padding:48px;color:var(--text-muted)">没有找到匹配的技能</div>';
  }
  document.getElementById('skill-list').innerHTML = html;
}

function toggleGroup(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.toggle-icon');
  body.classList.toggle('open');
  icon.textContent = body.classList.contains('open') ? '▼' : '▶';
}

function scrollToLayer(layerId) {
  const group = document.querySelector(`.skill-group[data-layer="${layerId}"]`);
  if (group) {
    const body = group.querySelector('.skill-group-body');
    if (!body.classList.contains('open')) {
      body.classList.add('open');
      group.querySelector('.toggle-icon').textContent = '▼';
    }
    group.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function renderArchDiagram() {
  const svg = document.getElementById('arch-diagram');
  const W = 140, H = 56, Y = 60;
  const layerNodes = LAYERS.map((l, i) => ({
    ...l, x: 120 + i * 200, y: Y
  }));
  const centerY = Y + H / 2;

  let html = '';

  // Arrow marker definition
  html += `<defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#71717a"/>
    </marker>
  </defs>`;

  // Input arrow into first node (no label, flow description below covers it)
  html += `<line x1="30" y1="${centerY}" x2="${layerNodes[0].x - 8}" y2="${centerY}"
    stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrowGray)">
    <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="1s" repeatCount="indefinite"/>
  </line>`;

  // Arrows between nodes (left → right, animated)
  for (let i = 0; i < layerNodes.length - 1; i++) {
    const a = layerNodes[i];
    const b = layerNodes[i + 1];
    const x1 = a.x + W + 2;
    const x2 = b.x - 2;
    html += `<line x1="${x1}" y1="${centerY}" x2="${x2}" y2="${centerY}"
      stroke="${a.color}" stroke-width="2" stroke-dasharray="8,5" opacity="0.6">
      <animate attributeName="stroke-dashoffset" from="0" to="-26" dur="1.2s" repeatCount="indefinite"/>
    </line>`;
    // Arrowhead triangle
    html += `<polygon points="${x2 - 6},${centerY - 5} ${x2 - 6},${centerY + 5} ${x2},${centerY}" fill="${a.color}" opacity="0.7"/>`;
  }

  // Output arrow from last node
  const last = layerNodes[layerNodes.length - 1];
  html += `<line x1="${last.x + W + 2}" y1="${centerY}" x2="${last.x + W + 50}" y2="${centerY}"
    stroke="${last.color}" stroke-width="1.5"/>`;
  html += `<text x="${last.x + W + 56}" y="${centerY + 5}" fill="#e4e4e7" font-size="13" font-weight="600">Output</text>`;

  // Nodes (drawn last so they sit on top of arrows)
  layerNodes.forEach(l => {
    html += `<rect x="${l.x}" y="${l.y}" width="${W}" height="${H}" rx="12"
      fill="${l.color}12" stroke="${l.color}" stroke-width="2"/>`;
    html += `<text x="${l.x + W / 2}" y="${l.y + 23}" text-anchor="middle" fill="${l.color}" font-size="13" font-weight="700">${l.id} ${l.name}</text>`;
    html += `<text x="${l.x + W / 2}" y="${l.y + 42}" text-anchor="middle" fill="#a1a1aa" font-size="11">${CSP_DATA.stats.by_layer[l.name]?.count || 0} skills</text>`;
  });

  // Flow description below
  html += `<text x="600" y="${Y + H + 50}" text-anchor="middle" fill="#71717a" font-size="11">
    用户输入 → L0 任务分类 → L1 方法论选择 → L2 工作流编排 → L3 模式匹配 → L4 运行时增强 → 最终输出
  </text>`;

  svg.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderHeader();
  renderLayerStack();
  renderStatsCards();
  renderDonutChart();
  renderCategoryBar();
  renderExplorer();
  renderArchDiagram();
});
</script>
